<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ecofleet Map</title>
  <link rel="stylesheet" href="https://js.arcgis.com/4.31/esri/themes/light/main.css" />
  <script src="https://js.arcgis.com/4.31/"></script>
  <style>
    html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; }
    #viewDiv { position: fixed; inset: 0; }
    #loading {
      position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
      flex-direction: column; background: #FFFFFF; z-index: 999; pointer-events: none;
      font-family: "IBM Plex Sans", system-ui, sans-serif; color: #525252; font-size: 13px;
      font-weight: 500;
    }
    .spinner {
      width: 28px; height: 28px; border: 3px solid #E5E5E5; border-top-color: #16A34A;
      border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="loading"><div class="spinner"></div><span id="loadingText">Loading map…</span></div>
  <div id="viewDiv"></div>
  <script>
    var view, routeLayer, stopLayer, vehicleLayer, mapReadySent = false;
    var busStopsFeatureLayer = null, busRoutesFeatureLayer = null;
    var highlightGraphic = null, highlightStopId = null;
    var followingTripId = null;
    var pendingFocusTripId = null;
    var routeZoomSuppressedUntil = 0;
    var NAV_ZOOM = 18;
    var lastCamFollowAt = 0;
    var params = new URLSearchParams(window.location.search);
    var arcgisToken = params.get('token');
    var portalUrl = params.get('portal') || 'https://esrirw.rw/portal';
    var stopsLayerUrl = params.get('stopsLayer') ||
      'https://esrirw.rw/server/rest/services/Bus_Lanes_BTS/FeatureServer/0';
    var routesLayerUrl = params.get('routesLayer') ||
      'https://esrirw.rw/server/rest/services/Bus_Lanes_BTS/FeatureServer/1';

    function hideLoading() {
      var el = document.getElementById('loading');
      if (el) el.style.display = 'none';
    }

    function signalReady() {
      if (mapReadySent) return;
      mapReadySent = true;
      hideLoading();
      window.parent.postMessage({ type: 'mapReady', basemap: window.__basemapName || 'satellite' }, '*');
    }

    function initMap() {
      require([
        'esri/Map',
        'esri/views/MapView',
        'esri/layers/GraphicsLayer',
        'esri/layers/FeatureLayer',
        'esri/layers/OpenStreetMapLayer',
        'esri/Basemap',
        'esri/identity/IdentityManager',
        'esri/config'
      ], function(Map, MapView, GraphicsLayer, FeatureLayer, OpenStreetMapLayer, Basemap, identityManager, esriConfig) {

        if (arcgisToken) {
          try {
            var expires = Date.now() + 7200000;
            // Portal generateToken (referer client) — needed for authenticated services.
            identityManager.registerToken({
              server: portalUrl.replace(/\/$/, '') + '/sharing/rest',
              token: arcgisToken,
              expires: expires,
              ssl: true
            });
            // FeatureServer lives on the ArcGIS Server host, not the portal.
            identityManager.registerToken({
              server: 'https://esrirw.rw/server',
              token: arcgisToken,
              expires: expires,
              ssl: true
            });
            identityManager.registerToken({
              server: 'https://esrirw.rw/server/rest/services',
              token: arcgisToken,
              expires: expires,
              ssl: true
            });
            // Belt-and-suspenders: always attach the portal token to Bus_Lanes_BTS requests.
            esriConfig.request.interceptors.push({
              urls: /esrirw\.rw\/server\/rest\/services\/Bus_Lanes_BTS/i,
              before: function(params) {
                params.requestOptions = params.requestOptions || {};
                params.requestOptions.query = params.requestOptions.query || {};
                if (!params.requestOptions.query.token) {
                  params.requestOptions.query.token = arcgisToken;
                }
              }
            });
          } catch (e) {}
        }

        // Network-wide background layers from Bus_Lanes_BTS FeatureServer.
        // Selected trip route/stops still render on GraphicsLayers above these.
        busRoutesFeatureLayer = new FeatureLayer({
          url: routesLayerUrl,
          title: 'Bus lanes',
          outFields: ['route_id', 'route_name', 'corridor', 'direction', 'length_km'],
          opacity: 0.85,
          popupEnabled: true,
          popupTemplate: {
            title: '{route_name}',
            content: [
              {
                type: 'fields',
                fieldInfos: [
                  { fieldName: 'route_id', label: 'Route ID' },
                  { fieldName: 'corridor', label: 'Corridor' },
                  { fieldName: 'direction', label: 'Direction' },
                  { fieldName: 'length_km', label: 'Length (km)' }
                ]
              }
            ]
          },
          renderer: {
            type: 'simple',
            symbol: {
              type: 'simple-line',
              color: [56, 189, 248, 0.75],
              width: 2.5,
              style: 'solid'
            }
          }
        });

        busStopsFeatureLayer = new FeatureLayer({
          url: stopsLayerUrl,
          title: 'Bus stops',
          outFields: ['stop_id', 'name', 'speed_kmh'],
          popupEnabled: true,
          popupTemplate: {
            title: '{name}',
            content: [
              {
                type: 'fields',
                fieldInfos: [
                  { fieldName: 'stop_id', label: 'Stop ID' },
                  { fieldName: 'speed_kmh', label: 'Speed (km/h)' }
                ]
              }
            ]
          },
          renderer: {
            type: 'simple',
            symbol: {
              type: 'simple-marker',
              style: 'circle',
              color: [245, 158, 11, 0.9],
              size: 7,
              outline: { color: [255, 255, 255, 0.95], width: 1.5 }
            }
          },
          labelingInfo: [{
            labelExpressionInfo: { expression: '$feature.name' },
            labelPlacement: 'above-center',
            minScale: 40000,
            symbol: {
              type: 'text',
              color: '#fff',
              haloColor: '#0f172a',
              haloSize: 1.5,
              font: { size: 9, weight: 'bold' }
            }
          }]
        });

        routeLayer = new GraphicsLayer({ title: 'Selected route', listMode: 'hide' });
        stopLayer = new GraphicsLayer({ title: 'Selected stops', listMode: 'hide' });
        vehicleLayer = new GraphicsLayer({ title: 'Vehicles', listMode: 'hide' });

        var map = new Map({ basemap: 'satellite' });
        map.addMany([
          busRoutesFeatureLayer,
          busStopsFeatureLayer,
          routeLayer,
          stopLayer,
          vehicleLayer
        ]);
        window.__basemapName = 'satellite';

        view = new MapView({
          container: 'viewDiv',
          map: map,
          center: [30.088, -1.946],
          zoom: 15,
          constraints: { minZoom: 8, maxZoom: 20 },
          ui: { components: [] }
        });

        // Only selected-trip graphics drive fleet/arrivals UI — keep FeatureLayer
        // interactions as popups so backend UUID-based workflows stay intact.
        view.on('click', function(event) {
          view.hitTest(event, { include: [vehicleLayer, stopLayer] }).then(function(res) {
            var vehicleHit = res.results.find(function(r) {
              return r.graphic && r.graphic.layer === vehicleLayer && r.graphic.attributes && r.graphic.attributes.tripId;
            });
            if (vehicleHit) {
              var tripId = vehicleHit.graphic.attributes.tripId;
              window.parent.postMessage({ type: 'vehicleClick', tripId: tripId }, '*');
              startFollow(tripId, true);
              return;
            }
            var stopHit = res.results.find(function(r) {
              return r.graphic && r.graphic.attributes && r.graphic.attributes.kind === 'stop';
            });
            if (stopHit) {
              var geom = stopHit.graphic.geometry;
              window.parent.postMessage({
                type: 'stopClick',
                stopId: stopHit.graphic.attributes.id,
                name: stopHit.graphic.attributes.name,
                longitude: geom && geom.longitude,
                latitude: geom && geom.latitude
              }, '*');
            }
          }).catch(function() {});
        });

        view.when(function() {
          signalReady();
        }).catch(function() {
          try {
            var osm = new OpenStreetMapLayer();
            map.basemap = new Basemap({ baseLayers: [osm], title: 'OpenStreetMap' });
            window.__basemapName = 'OpenStreetMap';
            view.when(function() { signalReady(); }).catch(function() { signalReady(); });
          } catch (err) {
            console.error('Map init failed:', err);
            signalReady();
          }
        });
      });
    }

    function drawRoute(data) {
      if (!routeLayer || !view) return;
      require([
        'esri/Graphic', 'esri/geometry/Point', 'esri/geometry/Polyline',
        'esri/geometry/Extent', 'esri/symbols/SimpleMarkerSymbol',
        'esri/symbols/SimpleLineSymbol', 'esri/symbols/TextSymbol'
      ], function(Graphic, Point, Polyline, Extent, SimpleMarkerSymbol, SimpleLineSymbol, TextSymbol) {

        routeLayer.removeAll();
        stopLayer.removeAll();

        var polyline = data.polyline;
        var stops = data.stops || [];
        routePath = polyline && polyline.length >= 2 ? polyline : null;

        if (polyline && polyline.length >= 2) {
          var line = new Polyline({ paths: [polyline] });
          routeLayer.add(new Graphic({
            geometry: line,
            symbol: new SimpleLineSymbol({ color: [255,255,255,0.95], width: 5, cap: 'round', join: 'round' })
          }));
          routeLayer.add(new Graphic({
            geometry: line,
            symbol: new SimpleLineSymbol({ color: '#16A34A', width: 3, cap: 'round', join: 'round' })
          }));

          if (!followingTripId && !pendingFocusTripId && Date.now() >= routeZoomSuppressedUntil) {
            var lngs = polyline.map(function(c) { return c[0]; });
            var lats = polyline.map(function(c) { return c[1]; });
            view.goTo(new Extent({
              xmin: Math.min.apply(null, lngs) - 0.008,
              ymin: Math.min.apply(null, lats) - 0.008,
              xmax: Math.max.apply(null, lngs) + 0.008,
              ymax: Math.max.apply(null, lats) + 0.008
            }), { duration: 800 }).catch(function() {});
          }
        }

        stops.forEach(function(stop, i) {
          var pt = new Point({ longitude: stop.longitude, latitude: stop.latitude });
          var isOrigin = i === 0;
          var isDest = i === stops.length - 1;
          var stopAttrs = { kind: 'stop', id: String(stop.id), name: stop.name };
          stopLayer.add(new Graphic({
            geometry: pt,
            attributes: stopAttrs,
            symbol: {
              type: 'picture-marker',
              url: stopIconUrl(isOrigin ? '#16A34A' : isDest ? '#0A0A0A' : '#525252'),
              width: isOrigin || isDest ? '28px' : '24px',
              height: isOrigin || isDest ? '28px' : '24px'
            }
          }));
          stopLayer.add(new Graphic({
            geometry: pt,
            attributes: stopAttrs,
            symbol: new TextSymbol({
              text: (i + 1) + '. ' + stop.name,
              color: '#fff', haloColor: '#14532D', haloSize: 2, yoffset: 18,
              font: { size: 10, weight: 'bold' }
            })
          }));
        });

        applyHighlight(highlightStopId);
        tryFocusVehicle();
      });
    }

    function applyHighlight(stopId) {
      highlightStopId = stopId || null;
      if (!stopLayer) return;
      require(['esri/Graphic', 'esri/symbols/SimpleMarkerSymbol'], function(Graphic, SimpleMarkerSymbol) {
        if (highlightGraphic) { stopLayer.remove(highlightGraphic); highlightGraphic = null; }
        if (!highlightStopId) return;
        var target = stopLayer.graphics.find(function(g) {
          return g.attributes && g.attributes.kind === 'stop' && g.attributes.id === highlightStopId;
        });
        if (!target) return;
        highlightGraphic = new Graphic({
          geometry: target.geometry,
          symbol: new SimpleMarkerSymbol({
            style: 'circle',
            size: 26,
            color: [3, 105, 161, 0.15],
            outline: { color: '#16A34A', width: 3 }
          })
        });
        stopLayer.add(highlightGraphic);
        if (view && !followingTripId) {
          view.goTo(
            { center: target.geometry, zoom: Math.max(view.zoom, 16) },
            { duration: 600 }
          ).catch(function() {});
        }
      });
    }

    var vehicleMarkers = {};
    var VEHICLE_ANIM_MS = 4500;
    var vehicleAnimRunning = false;
    var svgIconCache = {};
    var routePath = null;

    function svgDataUri(svg) {
      return 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(svg);
    }
    function stopIconUrl(color) {
      var key = 'stop:' + color;
      if (!svgIconCache[key]) {
        svgIconCache[key] = svgDataUri(
          '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">' +
          '<rect x="1.5" y="1.5" width="21" height="21" rx="6.5" fill="' + color + '" stroke="#ffffff" stroke-width="2"/>' +
          '<rect x="6.5" y="4.5" width="11" height="11" rx="2" fill="#ffffff"/>' +
          '<rect x="8" y="6" width="8" height="3.8" rx="1" fill="' + color + '"/>' +
          '<circle cx="9.3" cy="13" r="1.1" fill="' + color + '"/>' +
          '<circle cx="14.7" cy="13" r="1.1" fill="' + color + '"/>' +
          '<circle cx="9.3" cy="17.3" r="1.7" fill="#ffffff"/>' +
          '<circle cx="14.7" cy="17.3" r="1.7" fill="#ffffff"/>' +
          '</svg>'
        );
      }
      return svgIconCache[key];
    }

    function carIconUrl() {
      return '/nav-car-marker.png?v=5';
    }

    function vehicleSymbol(heading) {
      return {
        type: 'picture-marker',
        url: carIconUrl(),
        width: '72px',
        height: '72px',
        angle: ((heading || 0) % 360 + 360) % 360
      };
    }

    function lerpHeading(a, b, p) {
      var d = ((b - a + 540) % 360) - 180;
      return (a + d * p + 360) % 360;
    }
    function easeInOut(t) {
      return t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2;
    }
    function bearing(fromLon, fromLat, toLon, toLat) {
      var toRad = Math.PI / 180;
      var dLon = (toLon - fromLon) * toRad;
      var y = Math.sin(dLon) * Math.cos(toLat * toRad);
      var x = Math.cos(fromLat * toRad) * Math.sin(toLat * toRad) -
        Math.sin(fromLat * toRad) * Math.cos(toLat * toRad) * Math.cos(dLon);
      return (Math.atan2(y, x) * 180 / Math.PI + 360) % 360;
    }

    function routeSnappedHeading(lon, lat, travelHdg) {
      if (!routePath || routePath.length < 2) return null;
      var cosLat = Math.cos(lat * Math.PI / 180);
      var best = 0, bestD = Infinity;
      for (var i = 0; i < routePath.length; i++) {
        var dx = (routePath[i][0] - lon) * cosLat;
        var dy = routePath[i][1] - lat;
        var d = dx * dx + dy * dy;
        if (d < bestD) { bestD = d; best = i; }
      }
      if (bestD > 3e-7) return null;
      var fromIdx = Math.min(best, routePath.length - 2);
      var from = routePath[fromIdx];
      var seg = null;
      for (var j = fromIdx + 1; j < routePath.length; j++) {
        if (Math.abs(routePath[j][0] - from[0]) > 1e-7 || Math.abs(routePath[j][1] - from[1]) > 1e-7) {
          seg = bearing(from[0], from[1], routePath[j][0], routePath[j][1]);
          break;
        }
      }
      if (seg == null) return null;
      if (travelHdg != null) {
        var diff = ((seg - travelHdg + 540) % 360) - 180;
        if (Math.abs(diff) > 90) seg = (seg + 180) % 360;
      }
      return seg;
    }

    function vehicleLabelSymbol(plate, connected) {
      return {
        type: 'text', text: plate, color: '#fff',
        haloColor: connected ? '#14532D' : '#0A0A0A', haloSize: 2,
        yoffset: -40, font: { size: 11, weight: 'bold' }
      };
    }

    // Smooth camera: center on the car at street zoom. Throttled so ArcGIS
    // isn't flooded with goTo/center writes every animation frame.
    function syncNavCamera(lon, lat, hdg, force) {
      if (!view || !followingTripId) return;
      var now = Date.now();
      if (!force && now - lastCamFollowAt < 320) return;
      lastCamFollowAt = now;
      view.goTo(
        { center: [lon, lat], zoom: Math.max(view.zoom || NAV_ZOOM, NAV_ZOOM) },
        { duration: force ? 850 : 280, easing: 'ease-out' }
      ).catch(function() {});
    }

    function vehicleAnimTick() {
      var now = Date.now();
      var any = false;
      Object.keys(vehicleMarkers).forEach(function(id) {
        var e = vehicleMarkers[id];
        if (!e.anim) return;
        var raw = Math.min(1, (now - e.anim.start) / VEHICLE_ANIM_MS);
        var p = easeInOut(raw);
        var lon = e.anim.fromLon + (e.anim.toLon - e.anim.fromLon) * p;
        var lat = e.anim.fromLat + (e.anim.toLat - e.anim.fromLat) * p;
        var hdg = lerpHeading(e.anim.fromHdg, e.anim.toHdg, p);
        var geom = { type: 'point', longitude: lon, latitude: lat };
        e.marker.geometry = geom;
        if (Math.round(hdg / 2) !== Math.round(e.hdg / 2)) {
          e.marker.symbol = vehicleSymbol(hdg);
        }
        e.label.geometry = geom;
        e.lon = lon; e.lat = lat; e.hdg = hdg;
        if (followingTripId === id) {
          syncNavCamera(lon, lat, hdg, false);
        }
        if (raw < 1) any = true; else e.anim = null;
      });
      if (any) {
        requestAnimationFrame(vehicleAnimTick);
      } else {
        vehicleAnimRunning = false;
        if (followingTripId && vehicleMarkers[followingTripId]) {
          var fe = vehicleMarkers[followingTripId];
          syncNavCamera(fe.lon, fe.lat, fe.hdg, false);
        }
      }
    }

    function drawVehicles(tracking) {
      if (!vehicleLayer) return;
      require(['esri/Graphic'], function(Graphic) {
        var seen = {};
        (tracking || []).forEach(function(t) {
          if (t.longitude == null || t.latitude == null) return;
          seen[t.trip_id] = true;
          var connected = !!t.gps_connected;
          var e = vehicleMarkers[t.trip_id];
          if (!e) {
            var geom = { type: 'point', longitude: t.longitude, latitude: t.latitude };
            var initHdg = routeSnappedHeading(t.longitude, t.latitude, t.heading || null);
            if (initHdg == null) initHdg = t.heading || 0;
            var marker = new Graphic({
              geometry: geom,
              symbol: vehicleSymbol(initHdg),
              attributes: { tripId: t.trip_id, plate: t.vehicle_plate }
            });
            var label = new Graphic({
              geometry: geom,
              symbol: vehicleLabelSymbol(t.vehicle_plate, connected),
              attributes: { tripId: t.trip_id }
            });
            vehicleLayer.addMany([marker, label]);
            vehicleMarkers[t.trip_id] = {
              marker: marker, label: label,
              lon: t.longitude, lat: t.latitude, hdg: initHdg,
              travelHdg: t.heading || null,
              connected: connected, anim: null
            };
            if (pendingFocusTripId === t.trip_id || followingTripId === t.trip_id) {
              tryFocusVehicle();
            }
            return;
          }
          if (connected !== e.connected) {
            e.label.symbol = vehicleLabelSymbol(t.vehicle_plate, connected);
          }
          e.connected = connected;

          var movedMeters = Math.hypot(
            (t.latitude - e.lat) * 111320,
            (t.longitude - e.lon) * 111320 * Math.cos(t.latitude * Math.PI / 180)
          );
          if (movedMeters > 6) {
            e.travelHdg = bearing(e.lon, e.lat, t.longitude, t.latitude);
          } else if (e.travelHdg == null && t.heading) {
            e.travelHdg = t.heading;
          }

          var snapped = routeSnappedHeading(t.longitude, t.latitude, e.travelHdg);
          var newHdg = snapped != null ? snapped : (e.travelHdg != null ? e.travelHdg : e.hdg);
          if (movedMeters < 4) {
            var hDelta = Math.abs(((newHdg - e.hdg + 540) % 360) - 180);
            if (hDelta < 5) newHdg = e.hdg;
          }

          var far = Math.abs(t.longitude - e.lon) + Math.abs(t.latitude - e.lat) > 0.01;
          if (far) {
            var snapGeom = { type: 'point', longitude: t.longitude, latitude: t.latitude };
            e.marker.geometry = snapGeom;
            e.marker.symbol = vehicleSymbol(newHdg);
            e.label.geometry = snapGeom;
            e.lon = t.longitude; e.lat = t.latitude; e.hdg = newHdg;
            e.anim = null;
            if (followingTripId === t.trip_id) syncNavCamera(e.lon, e.lat, e.hdg, true);
          } else {
            e.anim = {
              start: Date.now(),
              fromLon: e.lon, fromLat: e.lat, fromHdg: e.hdg,
              toLon: t.longitude, toLat: t.latitude, toHdg: newHdg
            };
            if (!vehicleAnimRunning) {
              vehicleAnimRunning = true;
              requestAnimationFrame(vehicleAnimTick);
            }
          }
        });
        Object.keys(vehicleMarkers).forEach(function(id) {
          if (!seen[id]) {
            var gone = vehicleMarkers[id];
            vehicleLayer.removeMany([gone.marker, gone.label]);
            delete vehicleMarkers[id];
            if (followingTripId === id) followingTripId = null;
          }
        });
      });
    }

    function startFollow(tripId, forceZoom) {
      if (!tripId) {
        followingTripId = null;
        pendingFocusTripId = null;
        return;
      }
      followingTripId = tripId;
      pendingFocusTripId = tripId;
      routeZoomSuppressedUntil = Date.now() + 5000;
      var fe = vehicleMarkers[tripId];
      if (fe) {
        pendingFocusTripId = null;
        lastCamFollowAt = 0;
        syncNavCamera(fe.lon, fe.lat, fe.hdg, true);
      } else if (forceZoom) {
        // Vehicle not drawn yet — keep pending until setTracking arrives.
      }
    }

    function tryFocusVehicle() {
      var id = pendingFocusTripId || followingTripId;
      if (!id || !view) return false;
      var fe = vehicleMarkers[id];
      if (!fe) return false;
      followingTripId = id;
      pendingFocusTripId = null;
      lastCamFollowAt = 0;
      syncNavCamera(fe.lon, fe.lat, fe.hdg, true);
      return true;
    }

    window.addEventListener('message', function(event) {
      var data = event.data;
      if (!data || !data.type) return;
      if (data.type === 'setRoute') drawRoute(data);
      if (data.type === 'setTracking') drawVehicles(data.tracking);
      if (data.type === 'setHighlightStop') applyHighlight(data.stopId);
      if (data.type === 'followVehicle') {
        startFollow(data.tripId || null, true);
      }
      if (data.type === 'setCenter' && view && !followingTripId) {
        view.goTo({
          center: [data.longitude, data.latitude],
          zoom: data.zoom || 15
        }).catch(function() {});
      }
      if (data.type === 'fitBounds' && view && data.points && data.points.length) {
        followingTripId = null;
        pendingFocusTripId = null;
        require(['esri/geometry/Extent', 'esri/geometry/Point'], function(Extent, Point) {
          if (data.points.length === 1) {
            var p = data.points[0];
            view.goTo(
              { center: [p.longitude, p.latitude], zoom: 16 },
              { duration: 800 }
            ).catch(function() {});
            return;
          }
          var lngs = data.points.map(function(pt) { return pt.longitude; });
          var lats = data.points.map(function(pt) { return pt.latitude; });
          var pad = 0.01;
          view.goTo(new Extent({
            xmin: Math.min.apply(null, lngs) - pad,
            ymin: Math.min.apply(null, lats) - pad,
            xmax: Math.max.apply(null, lngs) + pad,
            ymax: Math.max.apply(null, lats) + pad,
            spatialReference: { wkid: 4326 }
          }), { duration: 800 }).catch(function() {});
        });
      }
    });

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', initMap);
